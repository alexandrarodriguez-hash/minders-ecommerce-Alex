# ---------------------------------------------------------
# Servidor
# ---------------------------------------------------------
server.port=8080

# ---------------------------------------------------------
# Braze
# ---------------------------------------------------------
# API Key de tipo REST API Key (no la de JS SDK), creada en
# Braze Dashboard > Developer Console > API Keys
braze.api-key=${BRAZE_API_KEY:CHANGE_ME}

# Endpoint REST según el cluster de tu instancia Braze.
# Lo ves en Braze Dashboard > Developer Console > REST Endpoint
# Ejemplos: https://rest.iad-01.braze.com, https://rest.fra-02.braze.com
braze.rest-endpoint=${BRAZE_REST_ENDPOINT:https://rest.iad-01.braze.com}

# Identificador de usuario a usar cuando el front no envía uno
# (demo sin login real). En producción reemplazar por el
# external_id real del usuario autenticado.
braze.default-user-id=${BRAZE_DEFAULT_USER_ID:demo-user}

# ---------------------------------------------------------
# CORS (permite que el front en React llame a este backend)
# ---------------------------------------------------------
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ---------------------------------------------------------
# Logging
# ---------------------------------------------------------
logging.level.com.minders.backend=INFO
